services:
  web:
    image: ghcr.io/akramboussanni/personal:main
    volumes:
      - ./public/uploads:/app/public/uploads
    environment:
      NODE_ENV: production
      PORT: 3000
      PORTFOLIO_ADMIN_PASSWORD: hello-i-am-legit
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true
